name: Android APK (Fully Fixed Build)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install missing system tools
        run: |
          apt-get update
          apt-get install -y wget curl zip unzip git

      - name: Install Python dependencies
        run: |
          pip3 install --upgrade pip
          pip3 install cython==0.29.36 buildozer

      - name: Build APK
        run: |
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
