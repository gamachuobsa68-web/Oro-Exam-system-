name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake python3-pip python3-setuptools
        pip3 install --user --upgrade "Cython<3.0.0" buildozer kivy

    - name: Custom Android SDK & NDK Setup (Safe Local Path)
      run: |
        # 1. Falanqa dhuunfaa (Local SDK) uumuu
        export LOCAL_SDK=$HOME/local-android-sdk
        mkdir -p $LOCAL_SDK/cmdline-tools/latest
        
        # 2. Commandline tools gadi fiduu
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools/* $LOCAL_SDK/cmdline-tools/latest/
        rm -rf cmdline-tools cmdline.zip
        
        # 3. FIX: Buildozer falanqa 'tools/bin/sdkmanager' jedhu waan barbaaduuf symlink uumuu
        mkdir -p $LOCAL_SDK/tools
        ln -s $LOCAL_SDK/cmdline-tools/latest/bin $LOCAL_SDK/tools/bin
        
        # 4. Licenses hunda guutummatti heyyamuu
        mkdir -p $LOCAL_SDK/licenses
        yes | $LOCAL_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$LOCAL_SDK --licenses
        
        # 5. Build-tools, platform-tools fi platforms fe'uu
        yes | $LOCAL_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$LOCAL_SDK "platform-tools" "build-tools;33.0.2" "platforms;android-33"
        
        # 6. Android NDK r28c bifa qulqulluun gadi fiduu
        mkdir -p $HOME/local-android-ndk
        wget -q https://dl.google.com/android/repository/android-ndk-r28c-linux.zip -O ndk.zip
        unzip -q ndk.zip -d $HOME/local-android-ndk/
        mv $HOME/local-android-ndk/android-ndk-r28c $HOME/local-android-ndk/android-ndk
        rm ndk.zip

    - name: Force Create Python-for-Android Directory
      run: |
        mkdir -p .buildozer/android/platform
        git clone --depth 1 -b master https://github.com/kivy/python-for-android.git .buildozer/android/platform/python-for-android

    - name: Build with Buildozer
      run: |
        export PATH=$PATH:$HOME/.local/bin
        # APK gufannoo tokko malee ijaaruu
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OroExam-APK
        path: bin/*.apk