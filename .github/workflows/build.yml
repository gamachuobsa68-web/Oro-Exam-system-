name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake
        python -m pip install --upgrade pip
        pip install "Cython<3.0.0" buildozer kivy virtualenv sh

    - name: Setup Private Android SDK & NDK (Anti-Overwrite Fix)
      run: |
        # 1. Falanqa dhuunfaa qopheessuu
        export LOCAL_SDK=$HOME/local-android-sdk
        mkdir -p $LOCAL_SDK/cmdline-tools/latest
        
        # 2. Commandline tools stable ta'e gadi fiduu
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools/* $LOCAL_SDK/cmdline-tools/latest/
        rm -rf cmdline-tools cmdline.zip
        
        # 3. FIX: Folder 'tools/bin' moofaa Buildozer barbaadu guutummatti uumuu
        mkdir -p $LOCAL_SDK/tools/bin
        cp $LOCAL_SDK/cmdline-tools/latest/bin/sdkmanager $LOCAL_SDK/tools/bin/sdkmanager
        
        # 4. Licenses hundumaa heyyamsiisuu
        mkdir -p $LOCAL_SDK/licenses
        yes | $LOCAL_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$LOCAL_SDK --licenses
        
        # 5. Build-tools, platform-tools fi platforms fe'uu
        yes | $LOCAL_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$LOCAL_SDK "platform-tools" "build-tools;33.0.2" "platforms;android-33"
        
        # 6. NDK r25c stable ta'e gadi fiduu
        mkdir -p $HOME/local-android-ndk
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip -O ndk.zip
        unzip -q ndk.zip -d $HOME/local-android-ndk/
        mv $HOME/local-android-ndk/android-ndk-r25c $HOME/local-android-ndk/android-ndk
        rm ndk.zip

    - name: Force Build with Buildozer (Clean Env)
      run: |
        # CRITICAL: Environment variables durtii ta'an hundumaa gara meeshaa keenya haaraatti naannessuu
        # Kuni Buildozer akka inni system SDK moofaa san keessatti hin ulamne ittisa.
        export ANDROID_HOME=/home/runner/local-android-sdk
        export ANDROID_SDK_ROOT=/home/runner/local-android-sdk
        export ANDROID_NDK_HOME=/home/runner/local-android-ndk/android-ndk
        export PATH=$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools:$PATH
        
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OroExam-APK
        path: bin/*.apk