name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake
        python -m pip install --upgrade pip
        pip install "Cython<3.0.0" buildozer kivy virtualenv sh

    - name: Pre-Accept Buildozer SDK Licenses (CRITICAL FIX)
      run: |
        # Folder SDK kan Buildozer ofiin ijaaru durstinee uumuu
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        
        # Lisenasii hunda 'yes' jedhanii bifa kanaan folder Buildozer keessa kaa'uu
        # Kuni Buildozer akka inni license 37 gaffii malee fudhatu taasisa
        echo -e "\n244d24a4e721fcc1d54547d9a35379a224783249" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo -e "\nd56f118745b851737bb973e87394746a9545314c" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license

    - name: Build with Buildozer
      run: |
        # APK gufannoo malee ijaaruu
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OroExam-APK
        path: bin/*.apk