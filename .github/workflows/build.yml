name: Build Oro Exam System APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          libssl-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          libncursesw5-dev \
          libffi-dev \
          uuid-dev \
          tar \
          unzip \
          zip \
          pkg-config

    - name: Install Pip Packages (Cython & Buildozer)
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36
        pip install git+https://github.com/kivy/buildozer.git@master

    - name: Cache Buildozer Directories
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-v3-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-v3-

    - name: Pre-Accept Android SDK Licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55
d56f5187479451eabf01fb78af6df7787f81f374
2433b2e1c064cc1fb7ad09c3e9847a322735cbea" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "8491b4c377535fc4e747a372bec2b7b51e5922e0
d975f751698a77b662f1254ddbeed39c31576d5b" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build Android APK with Buildozer
      run: |
        buildozer android debug
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Oro-Exam-System-APK
        path: bin/*.apk