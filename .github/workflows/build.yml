- name: Setup Android SDK (FINAL FIX SDKMANAGER)
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT

          cd $ANDROID_SDK_ROOT

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip

          # 🔥 FIX STRUCTURE (IMPORTANT)
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true

          export CMDLINE_TOOLS=$ANDROID_SDK_ROOT/cmdline-tools/latest
          export PATH=$CMDLINE_TOOLS/bin:$PATH
          export PATH=$ANDROID_SDK_ROOT/platform-tools:$PATH

          echo "PATH=$PATH"

          # 🔥 NOW sdkmanager EXISTS HERE
          ls $CMDLINE_TOOLS/bin

          chmod +x $CMDLINE_TOOLS/bin/sdkmanager

          yes | $CMDLINE_TOOLS/bin/sdkmanager --licenses || true

          $CMDLINE_TOOLS/bin/sdkmanager \
            --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"