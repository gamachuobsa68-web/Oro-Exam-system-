name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake python3-pip python3-setuptools
        pip3 install --user --upgrade "Cython<3.0.0" buildozer kivy

    - name: Force Pre-install Android SDK, NDK r28c & Setup Sdkmanager Path
      run: |
        # 1. Folder durtii SDK ijaaruu
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        
        # 2. Commandline tools gadi fiduu
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools/* $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
        rm -rf cmdline-tools cmdline.zip
        
        # 3. FIX: Buildozer falanqa 'android-sdk/tools/bin/sdkmanager' jedhu waan barbaaduuf symlink uumuu
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools
        ln -s $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin $HOME/.buildozer/android/platform/android-sdk/tools/bin
        
        export PATH=$PATH:$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        
        # 4. Licenses hunda heyyamuu
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses
        
        # 5. Meeshaalee barbaachisoo ta'an durstinee fe'uu
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk "platform-tools" "build-tools;37.0.0" "platforms;android-33"
        
        # 6. Android NDK r28c gadi fiduu
        mkdir -p $HOME/.buildozer/android/platform
        wget -q https://dl.google.com/android/repository/android-ndk-r28c-linux.zip -O ndk.zip
        unzip -q ndk.zip -d $HOME/.buildozer/android/platform/
        mv $HOME/.buildozer/android/platform/android-ndk-r28c $HOME/.buildozer/android/platform/android-ndk
        rm ndk.zip

    - name: Force Create Python-for-Android Directory
      run: |
        mkdir -p .buildozer/android/platform
        git clone --depth 1 -b master https://github.com/kivy/python-for-android.git .buildozer/android/platform/python-for-android

    - name: Build with Buildozer
      run: |
        export PATH=$PATH:$HOME/.local/bin
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OroExam-APK
        path: bin/*.apk