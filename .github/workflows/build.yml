name: Build APK (ULTIMATE FIX)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip wget \
            build-essential autoconf automake libtool pkg-config \
            cmake libffi-dev libssl-dev zlib1g-dev openjdk-17-jdk

      # 🔥 IMPORTANT: CLEAN OLD BROKEN SDK FIRST
      - name: Clean buildozer environment
        run: |
          rm -rf ~/.buildozer || true
          rm -rf ~/.android || true

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer==1.5.0
          pip install python-for-android

      # 🔥 FORCE BUILD WITHOUT OLD SDK PATH
      - name: Build APK (NO SDKMANAGER MODE)
        run: |
          export ANDROID_SKIP_SDK=true
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"

          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk