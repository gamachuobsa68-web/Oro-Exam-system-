name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake python3-pip python3-setuptools
        pip3 install --user --upgrade "Cython<3.0.0" buildozer kivy

    - name: Build with Buildozer (Safe Step Order)
      run: |
        export PATH=$PATH:$HOME/.local/bin
        
        # 1. Jalqaba clean gochuun falanqa qulqulleessuuf
        buildozer android clean
        
        # 2. Erga clean godhee booda Python-for-Android ofiin asitti gadi fiduu
        mkdir -p .buildozer/android/platform
        git clone --depth 1 -b master https://github.com/kivy/python-for-android.git .buildozer/android/platform/python-for-android
        
        # 3. Amma APK haala kanaan gufannoo malee ijaara
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OroExam-APK
        path: bin/*.apk