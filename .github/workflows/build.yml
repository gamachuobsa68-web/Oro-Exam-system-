name: Build Android APK (Kivy - Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget curl
        sudo apt install -y openjdk-17-jdk
        sudo apt install -y autoconf libtool pkg-config
        sudo apt install -y zlib1g-dev libncurses5-dev libffi-dev libssl-dev

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: Setup Android SDK + Accept Licenses (FIX ALL ERRORS)
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

        yes | sdkmanager --licenses || true

        sdkmanager --install \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;34.0.0"

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-${{ runner.os }}

    - name: Initialize Buildozer
      run: |
        buildozer init || true

    - name: Build APK
      run: |
        buildozer android debug