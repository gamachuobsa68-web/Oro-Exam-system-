name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"


    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"


    - name: Install Linux dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          git \
          zip \
          unzip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev


    - name: Install Android SDK
      uses: android-actions/setup-android@v3


    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses


    - name: Install Android packages
      run: |
        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"


    - name: Install Buildozer fixed versions
      run: |
        python -m pip install --upgrade pip

        pip install \
          "cython<3" \
          "buildozer==1.5.0" \
          "python-for-android==2024.1.21"


    - name: Clean old build
      run: |
        buildozer android clean || true

        rm -rf .buildozer
        rm -rf bin


    - name: Build APK
      run: |
        buildozer -v android debug


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Oro-Exam-APK
        path: bin/*.apk
