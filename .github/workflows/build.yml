name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk wget

      - name: Install Android SDK tools
        run: |
          mkdir -p $HOME/android-sdk
          echo "y" | sudo apt install sdkmanager || true

      - name: Accept Android licenses (FIX IMPORTANT)
        run: |
          yes | sdkmanager --licenses || true

      - name: Install Build Tools (FIX aidl)
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" || true

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36 buildozer

      - name: Build APK
        run: |
          buildozer android debug --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OroExamSystem-APK
          path: bin/*.apk