name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake
        python -m pip install --upgrade pip
        pip install "Cython<3.0.0" buildozer kivy virtualenv sh

    - name: Accept Android SDK Licenses
      run: |
        # SDK durtii GitHub Actions irratti argamuun licenses heyyamuu qofa
        mkdir -p $ANDROID_HOME/licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Build with Buildozer
      run: |
        # Buildozer akka inni ofiin meeshaa durtii (system SDK/NDK) dubbisu qofa nuyi ajajni
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OroExam-APK
        path: bin/*.apk