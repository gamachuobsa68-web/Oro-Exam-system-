name: Build Android APK (STABLE FIX)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Java 17 (required)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ✅ Python 3.11 (stable for buildozer)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ System dependencies
      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential autoconf automake libtool pkg-config \
            cmake libffi-dev libssl-dev zlib1g-dev

      # ✅ Install Buildozer
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer==1.5.0
          pip install python-for-android

      # 🔥 IMPORTANT: NO MANUAL SDK INSTALL (FIX EVERYTHING)
      - name: Build APK
        run: |
          buildozer -v android debug

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk