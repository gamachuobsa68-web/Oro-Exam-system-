name: Android Build (Kivy APK)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.10

    - name: Install system dependencies (SDK/NDK tools fix)
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk wget curl
        sudo apt install -y autoconf libtool pkg-config zlib1g-dev
        sudo apt install -y libncurses5-dev libffi-dev libssl-dev

    - name: Accept Android SDK licenses (FIX license error)
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        yes | sudo apt install -y sdkmanager || true

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-${{ runner.os }}

    - name: Initialize Buildozer (first run safe)
      run: |
        buildozer init || true

    - name: Build APK
      run: |
        buildozer android debug