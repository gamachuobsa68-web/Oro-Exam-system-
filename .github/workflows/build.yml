name: Build Android APK (Kivy)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python (FIXED)
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk
        sudo apt install -y autoconf libtool pkg-config
        sudo apt install -y zlib1g-dev libncurses5-dev libffi-dev libssl-dev
        sudo apt install -y wget curl

    - name: Accept Android licenses (FIX)
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-${{ runner.os }}

    - name: Initialize Buildozer
      run: |
        buildozer init || true

    - name: Build APK
      run: |
        buildozer android debug