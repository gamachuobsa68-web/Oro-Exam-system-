name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake python3-pip python3-setuptools
        # Buildozer fi Cython vershinii sirrii fe'uu
        pip3 install --user --upgrade "Cython<3.0.0" buildozer kivy

    - name: Setup Android SDK and NDK Paths (System Fix)
      run: |
        # SDK/NDK duraan Ubuntu Actions irratti fe'amee jiru dirqamaan licenses heyyamuu
        mkdir -p $ANDROID_HOME/licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # Build-Tools 33 fi 37 durstinee sirreessuuf
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "build-tools;37.0.0" "platforms;android-33"

    - name: Force Create Python-for-Android Directory
      run: |
        mkdir -p .buildozer/android/platform
        git clone --depth 1 -b master https://github.com/kivy/python-for-android.git .buildozer/android/platform/python-for-android

    - name: Build with Buildozer
      run: |
        export PATH=$PATH:$HOME/.local/bin
        # APK gufannoo malee ijaaruu
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OroExam-APK
        path: bin/*.apk