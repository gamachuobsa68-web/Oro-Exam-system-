name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake
        python -m pip install --upgrade pip
        pip install "Cython<3.0.0" buildozer kivy virtualenv sh

    - name: Setup Private Stable Android SDK & NDK
      run: |
        # 1. Folder haaraa qopheessuu
        export LOCAL_SDK=$HOME/local-android-sdk
        mkdir -p $LOCAL_SDK/cmdline-tools/latest
        
        # 2. Command-line tools isa sirrii fi stable ta'e gadi fiduu
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools/* $LOCAL_SDK/cmdline-tools/latest/
        rm -rf cmdline-tools cmdline.zip
        
        # 3. Path 'tools/bin/sdkmanager' kan Buildozer dhiphisu sun bifa symlink'n uumee gubbaa kaa'uu
        mkdir -p $LOCAL_SDK/tools
        ln -s $LOCAL_SDK/cmdline-tools/latest/bin $LOCAL_SDK/tools/bin
        
        # 4. Lisenasii Google dursee heyyamsiisuu
        mkdir -p $LOCAL_SDK/licenses
        yes | $LOCAL_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$LOCAL_SDK --licenses
        
        # 5. Build-tools fi platform barbaachisu fe'uu
        yes | $LOCAL_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$LOCAL_SDK "platform-tools" "build-tools;33.0.2" "platforms;android-33"
        
        # 6. NDK Stable ta'e (r25c) gadi fiduu (r28c isa falanqa uumu sana dhiisnee)
        mkdir -p $HOME/local-android-ndk
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip -O ndk.zip
        unzip -q ndk.zip -d $HOME/local-android-ndk/
        mv $HOME/local-android-ndk/android-ndk-r25c $HOME/local-android-ndk/android-ndk
        rm ndk.zip

    - name: Build with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OroExam-APK
        path: bin/*.apk