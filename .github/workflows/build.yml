name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk wget

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36 buildozer

      # =========================
      # 🔥 FIX 1: MEMORY ISSUE
      # =========================
      - name: Add Swap Memory
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      # =========================
      # 🔥 FIX 2: ANDROID SDK SETUP
      # =========================
      - name: Setup Android environment
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

      # =========================
      # 🔥 FIX 3: LICENSE ACCEPT + BUILD TOOLS FIX
      # =========================
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses || true
          yes | sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" || true

      # =========================
      # 🔥 BUILD APK
      # =========================
      - name: Build APK with Buildozer
        run: |
          buildozer android debug --verbose

      # =========================
      # 📦 UPLOAD APK
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OroExamSystem-APK
          path: bin/*.apk