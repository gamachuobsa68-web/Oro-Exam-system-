workflows:
  android-build:
    name: Android Build (Kivy)

    max_build_duration: 60

    scripts:
      - name: Install Python tools
        script: |
          python3 -m pip install --upgrade pip
          pip3 install cython==0.29.36 buildozer

      - name: Build APK
        script: |
          buildozer android debug

    artifacts:
      - bin/*.apk
