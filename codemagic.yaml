workflows:
  android-build:
    name: Android Build (Kivy)
    max_build_duration: 60

    environment:
      python: 3.10

    scripts:
      - name: Install dependencies
        script: |
          pip install --upgrade pip
          pip install cython==0.29.36 buildozer

      - name: Build APK
        script: |
          buildozer android debug

    artifacts:
      - bin/*.apk
