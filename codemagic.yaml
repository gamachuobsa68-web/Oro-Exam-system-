workflows:
  android-build:
    name: Android Build (Kivy)
    max_build_duration: 60

    environment:
      image: ubuntu-22.04
      vars:
        PYTHON_VERSION: 3.10

    scripts:
      - name: Install system dependencies
        script: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            build-essential autoconf libtool pkg-config python3-pip

      - name: Install Python packages
        script: |
          python3 -m pip install --upgrade pip
          pip3 install cython==0.29.36 buildozer

      - name: Build APK
        script: |
          buildozer android debug

    artifacts:
      - bin/*.apk
